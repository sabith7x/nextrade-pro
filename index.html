<script>
/* ===== CONFIG ===== */
const CFG={DEFAULT_RR:2,ATR_MULT:1.5,

STRAT_DESC:['9/21 EMA on 1M-5M','RSI+BB squeeze release','VWAP bounce trading','Volume delta analysis','Key level breakouts'],
STRAT_CLR:['#00e676','#29b6f6','#ffab00','#ab47ff','#ff3d57'],
PLANS:{basic:{price:29},pro:{price:79},premium:{price:149}},
MARKETS:[
{sym:'BTC/USDT',type:'crypto',base:67500,dec:2,vol:.0012},{sym:'ETH/USDT',type:'crypto',base:3450,dec:2,vol:.0015},
{sym:'SOL/USDT',type:'crypto',base:172,dec:2,vol:.0025},{sym:'BNB/USDT',type:'crypto',base:605,dec:2,vol:.002},
{sym:'XRP/USDT',type:'crypto',base:.62,dec:4,vol:.003},{sym:'DOGE/USDT',type:'crypto',base:.165,dec:5,vol:.004},
{sym:'ADA/USDT',type:'crypto',base:.48,dec:4,vol:.0035},{sym:'AVAX/USDT',type:'crypto',base:38.5,dec:2,vol:.003},
{sym:'DOT/USDT',type:'crypto',base:7.2,dec:3,vol:.003},{sym:'LINK/USDT',type:'crypto',base:14.8,dec:3,vol:.003},
{sym:'MATIC/USDT',type:'crypto',base:.72,dec:4,vol:.0035},{sym:'UNI/USDT',type:'crypto',base:7.5,dec:3,vol:.003},
{sym:'SHIB/USDT',type:'crypto',base:.0000245,dec:8,vol:.005},{sym:'LTC/USDT',type:'crypto',base:84,dec:2,vol:.0025},
{sym:'EUR/USD',type:'forex',base:1.0845,dec:5,vol:.0003},{sym:'GBP/USD',type:'forex',base:1.272,dec:5,vol:.0003},
{sym:'USD/JPY',type:'forex',base:154.5,dec:3,vol:.0004},{sym:'AUD/USD',type:'forex',base:.652,dec:5,vol:.0003},
{sym:'USD/CAD',type:'forex',base:1.385,dec:5,vol:.0003},{sym:'NZD/USD',type:'forex',base:.605,dec:5,vol:.0003},
{sym:'EUR/GBP',type:'forex',base:.8525,dec:5,vol:.0003},{sym:'EUR/JPY',type:'forex',base:167.5,dec:3,vol:.0004},
{sym:'GBP/JPY',type:'forex',base:196.5,dec:3,vol:.0004},{sym:'CHF/JPY',type:'forex',base:173.2,dec:3,vol:.0004}
]};

/* ===== STATE ===== */
let S={user:null,page:'dashboard',accType:'demo',botRunning:false,botMode:'paper',botPaused:false,
activeMarket:CFG.MARKETS[0],signals:[],trades:[],openTrades:[],demoBalance:10000,liveBalance:0,demoEquity:10000,liveEquity:0,dailyPnL:0,totalTrades:0,wins:0,
botTimer:null,priceTimer:null,killSwitch:false,trailingStop:false,chart:null,candleSeries:null,eqChart:null,
prices:{},marketData:{},tradeHours:{start:0,end:24},users:[],
selStrats:CFG.STRATS.slice(),selPairs:CFG.MARKETS.map(m=>m.sym),riskPct:1,maxOpen:3,manualPct:100};

/* ===== PERSISTENT STORAGE ===== */
const ST={
_k(){return'nx_'+S.user?.email||''},
saveUser(){if(!S.user)return;const u=S.users.find(x=>x.email===S.user.email);if(u){localStorage.setItem('nx_users',JSON.stringify(S.users));}},
saveBot(){if(!S.user)return;localStorage.setItem('nx_bots',JSON.stringify(bots));},
saveData(){if(!S.user)return;const k=ST._k();localStorage.setItem(k,JSON.stringify({trades:S.trades,openTrades:S.openTrades,demoBalance:S.demoBalance,liveBalance:S.liveBalance,demoEquity:S.demoEquity,liveEquity:S.liveEquity,transactions:S.transactions,totalTrades:S.totalTrades,wins:S.wins,dailyPnL:S.dailyPnL,selStrats:S.selStrats,selPairs:S.selPairs,riskPct:S.riskPct,maxOpen:S.maxOpen,manualPct:S.manualPct}));},
loadData(){if(!S.user)return;const d=JSON.parse(localStorage.getItem(ST._k())||'null');if(d){Object.assign(S,{trades:d.trades||[],openTrades:d.openTrades||[],demoBalance:d.demoBalance??10000,liveBalance:d.liveBalance??0,demoEquity:d.demoEquity??10000,liveEquity:d.liveEquity??0,transactions:d.transactions||[],totalTrades:d.totalTrades||0,wins:d.wins||0,dailyPnL:d.dailyPnL||0,selStrats:d.selStrats||CFG.STRATS.slice(),selPairs:d.selPairs||CFG.MARKETS.map(m=>m.sym),riskPct:d.riskPct??1,maxOpen:d.maxOpen??3,manualPct:d.manualPct??100});}},
loadUsers(){S.users=JSON.parse(localStorage.getItem('nx_users')||'[]');}
};

function getBal(){return S.accType==='demo'?S.demoBalance:S.liveBalance;}
function setBal(v){if(S.accType==='demo')S.demoBalance=v;else S.liveBalance=v;}
function getEq(){return S.accType==='demo'?S.demoEquity:S.liveEquity;}
function setEq(v){if(S.accType==='demo')S.demoEquity=v;else S.liveEquity=v;}

/* ===== TOAST ===== */
function toast(msg,type='info'){
const c=document.getElementById('toasts'),cl={info:'border-inf bg-inf/10',success:'border-acc bg-acc/10',error:'border-dng bg-dng/10',warning:'border-wrn bg-wrn/10'},ic={info:'fa-circle-info text-inf',success:'fa-circle-check text-acc',error:'fa-circle-xmark text-dng',warning:'fa-triangle-exclamation text-wrn'};
const el=document.createElement('div');el.className='toast-enter glass border-l-4 '+cl[type]+' rounded-lg px-4 py-3 flex items-center gap-3 text-sm';
el.innerHTML='<i class="fas '+ic[type]+'"></i><span>'+msg+'</span>';c.appendChild(el);
setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},4000);
}

/* ===== PRICE ENGINE ===== */
function genCandle(p,vol){const v=p*vol,d=(Math.random()-.498)*v,o=p,c=o+d+(Math.random()-.5)*v*.4,h=Math.max(o,c)+Math.random()*v*.6,l=Math.min(o,c)-Math.random()*v*.6;return{time:Math.floor(Date.now()/1000),open:+o.toFixed(10),high:+h.toFixed(10),low:+l.toFixed(10),close:+c.toFixed(10),volume:Math.floor(500+Math.random()*8000)};}
function initCandles(m,n=200){const cs=[];let p=m.base;for(let i=0;i<n;i++){const c=genCandle(p,m.vol);c.time-=(n-i)*60;cs.push(c);p=c.close;}return cs;}
function updatePrice(m){if(!S.marketData[m.sym])S.marketData[m.sym]={candles:initCandles(m)};const md=S.marketData[m.sym],last=md.candles[md.candles.length-1],nc=genCandle(last.close,m.vol);nc.time=Math.floor(Date.now()/1000);if(Math.floor(last.time/60)===Math.floor(nc.time/60)){nc.time=last.time;nc.high=Math.max(last.high,nc.high);nc.low=Math.min(last.low,nc.low);nc.volume=last.volume+nc.volume;md.candles[md.candles.length-1]=nc;}else{md.candles.push(nc);if(md.candles.length>500)md.candles.shift();}S.prices[m.sym]=nc.close;}
function updateAllPrices(){CFG.MARKETS.forEach(m=>updatePrice(m));}
function fmtDec(sym,v){return v.toFixed(CFG.MARKETS.find(m=>m.sym===sym)?.dec||2);}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

/* ===== INDICATORS ===== */
function calcEMA(d,p){const k=2/(p+1),r=[d[0]];for(let i=1;i<d.length;i++)r.push(d[i]*k+r[i-1]*(1-k));return r;}
function calcRSI(d,p=14){const r=new Array(d.length).fill(50);if(d.length<p+1)return r;let g=0,l=0;for(let i=1;i<=p;i++){const x=d[i]-d[i-1];if(x>0)g+=x;else l-=x;}g/=p;l/=p;r[p]=l===0?100:100-100/(1+g/l);for(let i=p+1;i<d.length;i++){const x=d[i]-d[i-1];g=(g*(p-1)+(x>0?x:0))/p;l=(l*(p-1)+(x<0?-x:0))/p;r[i]=l===0?100:100-100/(1+g/l);}return r;}
function calcBB(d,p=20,s=2){const u=[],m=[],lo=[],w=[];for(let i=0;i<d.length;i++){if(i<p-1){u.push(null);m.push(null);lo.push(null);w.push(null);continue;}const sl=d.slice(i-p+1,i+1),a=sl.reduce((a,b)=>a+b)/p,std=Math.sqrt(sl.reduce((a,b)=>a+(b-a)**2,0)/p);u.push(a+s*std);m.push(a);lo.push(a-s*std);w.push(std>0?(2*s*std)/a*100:0);}return{upper:u,middle:m,lower:lo,width:w};}
function calcATR(cs,p=14){const trs=[];for(let i=0;i<cs.length;i++){if(i===0){trs.push(cs[i].high-cs[i].low);continue;}trs.push(Math.max(cs[i].high-cs[i].low,Math.abs(cs[i].high-cs[i-1].close),Math.abs(cs[i].low-cs[i-1].close)));}const r=[];for(let i=0;i<trs.length;i++){if(i<p-1){r.push(null);continue;}r.push(trs.slice(i-p+1,i+1).reduce((a,b)=>a+b)/p);}return r;}
function calcVWAP(cs){let ct=0,cv=0;return cs.map(c=>{const tp=(c.high+c.low+c.close)/3;ct+=tp*c.volume;cv+=c.volume;return cv>0?ct/cv:tp;});}
function findSR(cs,lb=50){return{res:Math.max(...cs.slice(-lb).map(c=>c.high)),sup:Math.min(...cs.slice(-lb).map(c=>c.low))};}

/* ===== STRATEGIES ===== */
function runStrategies(sym){
const md=S.marketData[sym];if(!md||md.candles.length<30)return[];
const cs=md.candles,cl=cs.map(c=>c.close),n=cl.length-1,sig=[];
const e9=calcEMA(cl,9),e21=calcEMA(cl,21);
if(n>1&&e9[n-1]<=e21[n-1]&&e9[n]>e21[n])sig.push({s:'EMA Cross',d:'LONG',st:1});
if(n>1&&e9[n-1]>=e21[n-1]&&e9[n]<e21[n])sig.push({s:'EMA Cross',d:'SHORT',st:1});
if(S.selStrats.includes('RSI+BB')){const rsi=calcRSI(cl),bb=calcBB(cl);if(rsi[n]>48&&rsi[n]<55&&bb.width[n-1]&&bb.width[n]&&bb.width[n-1]<.3&&bb.width[n]>bb.width[n-1]*1.5){if(cl[n]<bb.lower[n])sig.push({s:'RSI+BB',d:'LONG',st:1.2});if(cl[n]>bb.upper[n])sig.push({s:'RSI+BB',d:'SHORT',st:1.2});}}
if(S.selStrats.includes('VWAP Rev')){const vw=calcVWAP(cs.slice(-100)),vl=vw[vw.length-1];if(cl[n]<vl*.998&&cl[n-1]>=vl*.998)sig.push({s:'VWAP Rev',d:'LONG',st:.9});if(cl[n]>vl*1.002&&cl[n-1]<=vl*1.002)sig.push({s:'VWAP Rev',d:'SHORT',st:.9});}
if(S.selStrats.includes('Order Flow')){const bv=cs.slice(-5).reduce((a,c)=>a+(c.close>c.open?c.volume:c.volume*.3),0),sv=cs.slice(-5).reduce((a,c)=>a+(c.close<c.open?c.volume:c.volume*.3),0),dt=(bv-sv)/(bv+sv+1);if(dt>.3)sig.push({s:'Order Flow',d:'LONG',st:dt});if(dt<-.3)sig.push({s:'Order Flow',d:'SHORT',st:Math.abs(dt)});}
if(S.selStrats.includes('S/R Break')){const sr=findSR(cs);if(cl[n]>sr.res&&cl[n-1]<=sr.res)sig.push({s:'S/R Break',d:'LONG',st:1.3});if(cl[n]<sr.sup&&cl[n-1]>=sr.sup)sig.push({s:'S/R Break',d:'SHORT',st:1.3});}
const lo=sig.filter(s=>s.d==='LONG'),sh=sig.filter(s=>s.d==='SHORT'),res=[];
if(lo.length>=2)res.push({dir:'LONG',strats:lo.map(s=>s.s),conf:lo.length});
if(sh.length>=2)res.push({dir:'SHORT',strats:sh.map(s=>s.s),conf:sh.length});
return res;
}

/* ===== RISK ===== */
function calcRisk(sym,dir){
const md=S.marketData[sym];if(!md)return null;const atrs=calcATR(md.candles),la=atrs.filter(a=>a).pop();if(!la)return null;
const pr=S.prices[sym];if(!pr)return null;const bal=getBal(),ra=bal*(S.riskPct/100),sd=la*CFG.ATR_MULT;
const sl=dir==='LONG'?pr-sd:pr+sd,tpd=sd*CFG.DEFAULT_RR,tp=dir==='LONG'?pr+tpd:pr-tpd;
return{price:pr,sl,tp,sd,tpd,qty:ra/sd,riskAmt:ra};
}

function canTrade(){
if(S.killSwitch)return false;if(S.botPaused)return false;
if(S.openTrades.length>=S.maxOpen)return false;
if(S.dailyPnL<=-(getBal()*.03))return false;
const h=new Date().getHours();return h>=S.tradeHours.start&&h<S.tradeHours.end;
}

/* ===== BOT ENGINE ===== */
function botTick(){
if(!S.botRunning||S.botPaused||S.killSwitch)return;if(!canTrade())return;
const mks=CFG.MARKETS.filter(m=>S.selPairs.includes(m.sym));
for(const m of mks){const sigs=runStrategies(m.sym);if(sigs.length>0){const sig=sigs[0],risk=calcRisk(m.sym,sig.dir);if(!risk||S.openTrades.find(t=>t.sym===m.sym))continue;execTrade(m.sym,sig.dir,risk,sig);break;}}
updateOpenTrades();
}

function execTrade(sym,dir,risk,sig){
const t={id:Date.now()+'_'+Math.random().toString(36).substr(2,4),sym,dir,entry:risk.price,sl:risk.sl,tp:risk.tp,qty:risk.qty,riskAmt:risk.riskAmt,strats:sig.strats,conf:sig.conf,time:Date.now(),status:'open',pnl:0,trailing:S.trailingStop,hiPnl:0,accType:S.accType};
S.openTrades.push(t);S.signals.unshift({sym,dir,strats:sig.strats,time:Date.now(),conf:sig.conf});
if(S.signals.length>50)S.signals.pop();toast(dir+' '+sym+' — '+sig.strats.join(', '),'success');ST.saveData();
}

function updateOpenTrades(){
const cl=[];S.openTrades.forEach(t=>{const p=S.prices[t.sym];if(!p)return;const pnl=t.dir==='LONG'?(p-t.entry)*t.qty:(t.entry-p)*t.qty;t.pnl=pnl;t.curPrice=p;
if(t.trailing&&pnl>t.hiPnl){t.hiPnl=pnl;t.tSL=t.dir==='LONG'?t.entry+pnl*.5:t.entry-pnl*.5;}
let x=false;if(t.dir==='LONG'){if(p<=t.sl||p>=t.tp)x=true;if(t.tSL&&p<=t.tSL&&t.hiPnl>0)x=true;}else{if(p>=t.sl||p<=t.tp)x=true;if(t.tSL&&p>=t.tSL&&t.hiPnl>0)x=true;}
if(x)cl.push(t);});
cl.forEach(t=>{t.status='closed';t.exitTime=Date.now();t.exitPrice=S.prices[t.sym]||t.entry;S.trades.unshift(t);if(S.trades.length>200)S.trades.pop();S.openTrades=S.openTrades.filter(o=>o.id!==t.id);S.totalTrades++;if(t.pnl>0)S.wins++;S.dailyPnL+=t.pnl;setBal(getBal()+t.pnl);setEq(getBal()+S.openTrades.reduce((a,o)=>a+o.pnl,0));toast('Closed '+t.sym+': '+(t.pnl>=0?'+':'')+t.pnl.toFixed(2),t.pnl>=0?'success':'error');});
if(cl.length)ST.saveData();
}

function startBot(){if(S.botRunning)return;S.botRunning=true;S.killSwitch=false;S.botTimer=setInterval(botTick,3000);toast('Bot started — scanning markets','success');renderPage();}
function stopBot(){S.botRunning=false;clearInterval(S.botTimer);toast('Bot stopped','warning');renderPage();}
function pauseBot(){S.botPaused=!S.botPaused;toast(S.botPaused?'Bot paused':'Bot resumed',S.botPaused?'warning':'success');renderPage();}
function doKillSwitch(){S.killSwitch=true;S.botRunning=false;clearInterval(S.botTimer);S.openTrades.forEach(t=>{t.status='closed';t.exitTime=Date.now();t.exitPrice=S.prices[t.sym]||t.entry;t.pnl=t.pnl||0;S.trades.unshift(t);setBal(getBal()+t.pnl);S.dailyPnL+=t.pnl;});S.openTrades=[];toast('KILL SWITCH — All closed','error');ST.saveData();renderPage();}

/* ===== AUTH ===== */
function register(e,p,n){
if(!e.endsWith('@gmail.com'))return toast('Only Gmail addresses allowed','error');
if(p.length<6)return toast('Password min 6 characters','error');
if(!n.trim())return toast('Name required','error');
let u=S.users.find(x=>x.email===e);
if(!u){u={email:e,name:n,plan:'premium',role:S.users.length===0?'admin':'user',created:Date.now()};S.users.push(u);ST.saveUser();}
S.user=u;ST.loadData();localStorage.setItem('nx_session',e);toast('Welcome, '+n+'!','success');renderApp();
}

if(!e.endsWith('@gmail.com'))return toast('Only Gmail addresses allowed','error');
let u=S.users.find(x=>x.email===e);
if(!u){u={email:e,name:e.split('@')[0],plan:'premium',role:S.users.length===0?'admin':'user',created:Date.now()};S.users.push(u);ST.saveUser();}
S.user=u;ST.loadData();localStorage.setItem('nx_session',e);toast('Welcome, '+u.name,'success');renderApp();
}

/* ===== WALLET ===== */
function addDeposit(amt,method){amt=parseFloat(amt);if(isNaN(amt)||amt<=0)return toast('Enter valid amount','error');S.transactions=S.transactions||[];S.transactions.unshift({id:Date.now(),type:'deposit',amount:amt,method,status:'approved',time:Date.now(),accType:S.accType});setBal(getBal()+amt);setEq(getBal()+S.openTrades.reduce((a,o)=>a+o.pnl,0));ST.saveData();toast('$'+amt.toFixed(2)+' deposited to '+(S.accType==='demo'?'Demo':'Live'),'success');renderPage();}
function reqWithdraw(amt,method){amt=parseFloat(amt);if(isNaN(amt)||amt<=0)return toast('Enter valid amount','error');if(amt>getBal())return toast('Insufficient balance','error');S.transactions=S.transactions||[];const tx={id:Date.now(),type:'withdrawal',amount:amt,method,status:S.user?.role==='admin'?'approved':'pending',email:S.user.email,time:Date.now(),accType:S.accType};S.transactions.unshift(tx);setBal(getBal()-amt);setEq(getBal()+S.openTrades.reduce((a,o)=>a+o.pnl,0));ST.saveData();toast('$'+amt.toFixed(2)+' withdrawal requested','success');renderPage();}

/* ===== CHART ===== */
function initChart(){
const ct=document.getElementById('tv-chart');if(!ct||typeof LightweightCharts==='undefined')return;
if(S.chart){S.chart.remove();S.chart=null;}ct.innerHTML='';
S.chart=LightweightCharts.createChart(ct,{layout:{background:{type:'solid',color:'#0d1321'},textColor:'#6b7a94',fontFamily:'JetBrains Mono',fontSize:11},grid:{vertLines:{color:'#1e2a4540'},horzLines:{color:'#1e2a4540'}},crosshair:{mode:0},rightPriceScale:{borderColor:'#1e2a45'},timeScale:{borderColor:'#1e2a45',timeVisible:true,secondsVisible:false},width:ct.clientWidth,height:ct.clientHeight||380});
S.candleSeries=S.chart.addCandlestickSeries({upColor:'#00e676',downColor:'#ff3d57',borderUpColor:'#00e676',borderDownColor:'#ff3d57',wickUpColor:'#00e676',wickDownColor:'#ff3d57'});
const md=S.marketData[S.activeMarket.sym];if(md)S.candleSeries.setData(md.candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
if(md&&md.candles.length>21){const cl=md.candles.map(c=>c.close),e9=calcEMA(cl,9),e21=calcEMA(cl,21);const l1=S.chart.addLineSeries({color:'#29b6f6',lineWidth:1,priceLineVisible:false,lastValueVisible:false});const l2=S.chart.addLineSeries({color:'#ffab00',lineWidth:1,priceLineVisible:false,lastValueVisible:false});l1.setData(md.candles.map((c,i)=>({time:c.time,value:e9[i]})));l2.setData(md.candles.map((c,i)=>({time:c.time,value:e21[i]})));}
new ResizeObserver(()=>{if(S.chart)S.chart.applyOptions({width:ct.clientWidth,height:ct.clientHeight||380});}).observe(ct);
}
function updateChart(){if(!S.candleSeries)return;const md=S.marketData[S.activeMarket.sym];if(!md)return;const l=md.candles[md.candles.length-1];S.candleSeries.update({time:l.time,open:l.open,high:l.high,low:l.low,close:l.close});}
function initEqChart(){const ctx=document.getElementById('eq-chart');if(!ctx)return;if(S.eqChart)S.eqChart.destroy();const ed=[];let b=10000;S.trades.filter(t=>t.accType===S.accType).slice().reverse().forEach(t=>{b+=t.pnl;ed.push({x:new Date(t.exitTime).toLocaleDateString(),y:b});});if(!ed.length)ed.push({x:'Today',y:getBal()});S.eqChart=new Chart(ctx,{type:'line',data:{labels:ed.map(d=>d.x),datasets:[{data:ed.map(d=>d.y),borderColor:'#00e676',backgroundColor:'rgba(0,230,118,.05)',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b7a94',maxTicksLimit:6,font:{family:'JetBrains Mono',size:10}},grid:{color:'#1e2a4530'}},y:{ticks:{color:'#6b7a94',font:{family:'JetBrains Mono',size:10},callback:v=>'$'+v.toFixed(0)},grid:{color:'#1e2a4530'}}}}});}

<div><label class="text-[10px] text-mut mb-1 block">R:R Ratio</label><select class="input-f w-full rounded-lg px-3 py-1.5 text-xs" onchange="CFG.DEFAULT_RR=+this.value"><option value="1.5">1:1.5</option><option value="2" selected>1:2</option><option value="3">1:3</option><option value="4">1:4</option></select></div>
<div><label class="text-[10px] text-mut mb-1 block">Max Open Trades</label><select class="input-f w-full rounded-lg px-3 py-1.5 text-xs" onchange="S.maxOpen=+this.value;ST.saveData()"><option value="1" ${S.maxOpen===1?'selected':''}>1</option><option value="3" ${S.maxOpen===3?'selected':''}>3</option><option value="5" ${S.maxOpen===5?'selected':''}>5</option><option value="10" ${S.maxOpen===10?'selected':''}>10</option></select></div>
<div class="flex items-center justify-between"><span class="text-xs">Trailing Stop</span><button onclick="S.trailingStop=!S.trailingStop;ST.saveData();renderPage()" class="w-10 h-5 rounded-full transition-all ${S.trailingStop?'bg-acc':'bg-cd'} relative"><span class="absolute top-0.5 ${S.trailingStop?'left-[18px]':'left-0.5'} w-4 h-4 rounded-full bg-white transition-all"></span></button></div>
<div><label class="text-[10px] text-mut mb-1 block">Trading Hours</label><div class="flex gap-2 items-center"><input type="number" value="${S.tradeHours.start}" min="0" max="23" class="input-f w-14 rounded-lg px-2 py-1 text-xs text-center font-mono" onchange="S.tradeHours.start=+this.value"><span class="text-mut text-xs">to</span><input type="number" value="${S.tradeHours.end}" min="0" max="24" class="input-f w-14 rounded-lg px-2 py-1 text-xs text-center font-mono" onchange="S.tradeHours.end=+this.value"></div></div>
</div></div>

<div class="space-y-5">
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3">Strategies <span class="text-mut font-normal">(${S.selStrats.length}/${CFG.STRATS.length})</span></h3>
<div class="space-y-1.5">${CFG.STRATS.map((s,i)=>'<label class="flex items-center gap-2.5 p-2 rounded-lg hover:bg-cd/50 cursor-pointer"><input type="checkbox" '+(S.selStrats.includes(s)?'checked':'')+' class="accent-[#00e676]" onchange="toggleStrat(\''+s+'\')"><div class="w-6 h-6 rounded flex items-center justify-center text-[10px] font-bold" style="background:'+CFG.STRAT_CLR[i]+'20;color:'+CFG.STRAT_CLR[i]+'">'+(i+1)+'</div><div><p class="text-xs font-medium">'+s+'</p><p class="text-[10px] text-mut">'+CFG.STRAT_DESC[i]+'</p></div></label>').join('')}</div>
<div class="flex gap-2 mt-2"><button onclick="S.selStrats=CFG.STRATS.slice();ST.saveData();renderPage()" class="text-[10px] text-acc hover:underline">Select All</button><button onclick="S.selStrats=[];ST.saveData();renderPage()" class="text-[10px] text-mut hover:underline">Deselect All</button></div></div>

<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3">Pairs <span class="text-mut font-normal">(${S.selPairs.length}/${CFG.MARKETS.length})</span></h3>
<div class="mb-2"><label class="text-[10px] text-mut mb-1 block">Filter</label><select class="input-f w-full rounded-lg px-3 py-1.5 text-xs" onchange="filterPairs(this.value)"><option value="all">All Pairs</option><option value="crypto">Crypto Only</option><option value="forex">Forex Only</option></select></div>
<div class="max-h-48 overflow-y-auto space-y-0.5">${CFG.MARKETS.map(m=>'<label class="flex items-center gap-2 py-1 px-2 rounded hover:bg-cd/50 cursor-pointer"><input type="checkbox" '+(S.selPairs.includes(m.sym)?'checked':'')+' class="accent-[#00e676]" onchange="togglePair(\''+m.sym+'\')"><span class="text-xs font-mono">'+m.sym+'</span><span class="text-[10px] text-mut ml-auto">'+m.type+'</span></label>').join('')}</div>
<div class="flex gap-2 mt-2"><button onclick="S.selPairs=CFG.MARKETS.map(m=>m.sym);ST.saveData();renderPage()" class="text-[10px] text-acc hover:underline">Select All</button><button onclick="S.selPairs=[];ST.saveData();renderPage()" class="text-[10px] text-mut hover:underline">Deselect All</button></div></div>
</div></div>`;
}
function toggleStrat(s){const i=S.selStrats.indexOf(s);if(i>-1)S.selStrats.splice(i,1);else S.selStrats.push(s);ST.saveData();}
function togglePair(p){const i=S.selPairs.indexOf(p);if(i>-1)S.selPairs.splice(i,1);else S.selPairs.push(p);ST.saveData();}
function filterPairs(type){if(type==='all')S.selPairs=CFG.MARKETS.map(m=>m.sym);else if(type==='crypto')S.selPairs=CFG.MARKETS.filter(m=>m.type==='crypto').map(m=>m.sym);else S.selPairs=CFG.MARKETS.filter(m=>m.type==='forex').map(m=>m.sym);ST.saveData();renderPage();}

/* ===== TRADES ===== */
function pgTrades(){
const cl=S.trades.filter(t=>t.accType===S.accType).slice(0,50),tp=cl.reduce((a,t)=>a+t.pnl,0),wins=cl.filter(t=>t.pnl>0),losses=cl.filter(t=>t.pnl<0);
document.getElementById('pc').innerHTML=`<div class="flex items-center justify-between mb-5"><div><h1 class="text-lg font-bold">Trade History</h1><p class="text-mut text-xs">${S.totalTrades} total — ${S.wins}W / ${S.totalTrades-S.wins}L</p></div><div class="acc-sw"><div class="sl ${S.accType==='live'?'right':''}"></div><button class="${S.accType==='demo'?'on':''}" onclick="S.accType='demo';ST.saveData();renderPage()">DEMO</button><button class="${S.accType==='live'?'on':''}" onclick="S.accType='live';ST.saveData();renderPage()">LIVE</button></div></div>
<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5"><div class="glass rounded-xl p-3"><p class="text-[10px] text-mut mb-0.5">Total PnL</p><p class="font-mono font-bold ${tp>=0?'text-acc':'text-dng'}">${tp>=0?'+$':'-$'}${Math.abs(tp).toFixed(2)}</p></div><div class="glass rounded-xl p-3"><p class="text-[10px] text-mut mb-0.5">Win Rate</p><p class="font-mono font-bold">${S.totalTrades>0?(S.wins/S.totalTrades*100).toFixed(1):'0'}%</p></div><div class="glass rounded-xl p-3"><p class="text-[10px] text-mut mb-0.5">Avg Win</p><p class="font-mono font-bold text-acc">${wins.length?'+$'+(wins.reduce((a,t)=>a+t.pnl,0)/wins.length).toFixed(2):'$0'}</p></div><div class="glass rounded-xl p-3"><p class="text-[10px] text-mut mb-0.5">Avg Loss</p><p class="font-mono font-bold text-dng">${losses.length?'-$'+(Math.abs(losses.reduce((a,t)=>a+t.pnl,0)/losses.length)).toFixed(2):'$0'}</p></div></div>
<div class="glass rounded-xl overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="text-[10px] text-mut bg-cd/50"><th class="p-2.5">Time</th><th class="p-2.5">Pair</th><th class="p-2.5">Dir</th><th class="p-2.5">Entry</th><th class="p-2.5">Exit</th><th class="p-2.5">PnL</th><th class="p-2.5">Strategy</th></tr></thead><tbody>${cl.map(t=>'<tr class="trade-row border-b border-bd/30"><td class="p-2.5 font-mono text-[10px] text-mut">'+new Date(t.time).toLocaleString()+'</td><td class="p-2.5 font-mono font-medium">'+t.sym+'</td><td class="p-2.5"><span class="sb '+(t.dir==='LONG'?'bg-acc/15 text-acc':'bg-dng/15 text-dng')+'">'+t.dir+'</span></td><td class="p-2.5 font-mono">'+fmtDec(t.sym,t.entry)+'</td><td class="p-2.5 font-mono">'+fmtDec(t.sym,t.exitPrice||0)+'</td><td class="p-2.5 font-mono font-bold '+(t.pnl>=0?'text-acc':'text-dng')+'">'+(t.pnl>=0?'+':'')+t.pnl.toFixed(2)+'</td><td class="p-2.5 text-[10px] text-mut">'+(t.strats?.join(', ')||'-')+'</td></tr>').join('')||'<tr><td colspan="7" class="p-6 text-center text-mut">No closed trades</td></tr>'}</tbody></table></div></div>`;
}

/* ===== WALLET ===== */
function pgWallet(){
const pd=(S.transactions||[]).filter(t=>t.status==='pending');
document.getElementById('pc').innerHTML=`<div class="flex items-center justify-between mb-5"><div><h1 class="text-lg font-bold">Wallet</h1><p class="text-mut text-xs">Deposit and withdraw funds</p></div><div class="acc-sw"><div class="sl ${S.accType==='live'?'right':''}"></div><button class="${S.accType==='demo'?'on':''}" onclick="S.accType='demo';ST.saveData();renderPage()">DEMO</button><button class="${S.accType==='live'?'on':''}" onclick="S.accType='live';ST.saveData();renderPage()">LIVE</button></div></div>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3"><i class="fas fa-arrow-down text-acc mr-1.5"></i>Deposit</h3><div class="space-y-3"><div><label class="text-[10px] text-mut mb-1 block">Amount (USDT)</label><input id="da" type="number" min="1" placeholder="Enter amount" class="input-f w-full rounded-xl px-3 py-2.5 text-xs font-mono"></div><div><label class="text-[10px] text-mut mb-1 block">Method</label><select id="dm" class="input-f w-full rounded-xl px-3 py-2.5 text-xs"><option>USDT TRC20</option><option>USDT BEP20</option><option>USDT ERC20</option><option>Bank Transfer</option></select></div><button onclick="addDeposit(document.getElementById('da').value,document.getElementById('dm').value)" class="btn-acc w-full py-2.5 rounded-xl text-xs">Deposit</button></div></div>
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3"><i class="fas fa-arrow-up text-wrn mr-1.5"></i>Withdraw</h3><div class="space-y-3"><div><label class="text-[10px] text-mut mb-1 block">Amount (USDT)</label><input id="wa" type="number" min="1" placeholder="Enter amount" class="input-f w-full rounded-xl px-3 py-2.5 text-xs font-mono"></div><div><label class="text-[10px] text-mut mb-1 block">Method</label><select id="wm" class="input-f w-full rounded-xl px-3 py-2.5 text-xs"><option>USDT TRC20</option><option>USDT BEP20</option><option>Bank Transfer</option></select></div><div class="text-[10px] text-mut">Available: <span class="font-mono text-white">$${getBal().toFixed(2)}</span></div><button onclick="reqWithdraw(document.getElementById('wa').value,document.getElementById('wm').value)" class="w-full py-2.5 rounded-xl text-xs bg-wrn/10 text-wrn border border-wrn/20 hover:bg-wrn/20 transition-all font-semibold">Withdraw</button></div></div>
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3">Balance</h3><div class="text-center py-3"><p class="text-2xl font-mono font-bold">$${getBal().toFixed(2)}</p><p class="text-[10px] text-mut mt-1">${S.accType==='demo'?'Demo':'Live'} Account</p></div><div class="space-y-1.5 mt-3 text-xs"><div class="flex justify-between"><span class="text-mut">Open PnL</span><span class="font-mono ${S.openTrades.reduce((a,t)=>a+t.pnl,0)>=0?'text-acc':'text-dng'}">${S.openTrades.reduce((a,t)=>a+t.pnl,0)>=0?'+':''}$${S.openTrades.reduce((a,t)=>a+t.pnl,0).toFixed(2)}</span></div><div class="flex justify-between"><span class="text-mut">Equity</span><span class="font-mono font-bold">$${getEq().toFixed(2)}</span></div>${pd.length?'<div class="flex justify-between"><span class="text-wrn">Pending</span><span class="font-mono text-wrn">$'+pd.reduce((a,t)=>a+t.amount,0).toFixed(2)+'</span></div>':''}</div></div></div>
<div class="glass rounded-xl mt-5 overflow-hidden"><div class="p-3 border-b border-bd"><h3 class="text-xs font-semibold">Transactions</h3></div><div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="text-[10px] text-mut bg-cd/50"><th class="p-2.5">Time</th><th class="p-2.5">Type</th><th class="p-2.5">Amount</th><th class="p-2.5">Method</th><th class="p-2.5">Status</th><th class="p-2.5">Account</th></tr></thead><tbody>${(S.transactions||[]).slice(0,20).map(t=>'<tr class="trade-row border-b border-bd/30"><td class="p-2.5 font-mono text-[10px] text-mut">'+new Date(t.time).toLocaleString()+'</td><td class="p-2.5"><span class="sb '+(t.type==='deposit'?'bg-acc/15 text-acc':'bg-wrn/15 text-wrn')+'">'+t.type+'</span></td><td class="p-2.5 font-mono font-bold">'+(t.type==='deposit'?'+':'-')+'$'+t.amount.toFixed(2)+'</td><td class="p-2.5 text-[10px] text-mut">'+t.method+'</td><td class="p-2.5"><span class="sb '+(t.status==='approved'?'bg-acc/15 text-acc':t.status==='pending'?'bg-wrn/15 text-wrn':'bg-dng/15 text-dng')+'">'+t.status+'</span></td><td class="p-2.5 text-[10px] text-mut">'+(t.accType||'demo')+'</td></tr>').join('')||'<tr><td colspan="6" class="p-6 text-center text-mut">No transactions</td></tr>'}</tbody></table></div></div>`;
}

/* ===== ADMIN ===== */
function pgAdmin(){
let pwHTML='';S.users.forEach(u=>{const d=JSON.parse(localStorage.getItem('nx_'+u.email)||'{}');(d?.transactions||[]).filter(t=>t.status==='pending'&&t.type==='withdrawal').forEach(t=>{pwHTML+='<div class="flex items-center justify-between py-2.5 border-b border-bd/30"><div><span class="font-mono text-xs">'+u.email+'</span><span class="text-mut text-[10px] ml-2">'+t.method+'</span></div><div class="flex items-center gap-2"><span class="font-mono text-xs font-bold">$'+t.amount.toFixed(2)+'</span><button onclick="aprW(\''+u.email+'\','+t.id+')" class="px-2.5 py-1 rounded text-[10px] bg-acc/15 text-acc hover:bg-acc/25">Approve</button><button onclick="rejW(\''+u.email+'\','+t.id+')" class="px-2.5 py-1 rounded text-[10px] bg-dng/15 text-dng hover:bg-dng/25">Reject</button></div></div>';});});
document.getElementById('pc').innerHTML=`<h1 class="text-lg font-bold mb-1">Admin Panel</h1><p class="text-mut text-xs mb-5">System management</p>
<div class="grid grid-cols-3 gap-3 mb-5"><div class="glass rounded-xl p-3"><p class="text-[10px] text-mut mb-0.5">Users</p><p class="font-mono text-lg font-bold">${S.users.length}</p></div><div class="glass rounded-xl p-3"><p class="text-[10px] text-mut mb-0.5">Total Balances</p><p class="font-mono text-lg font-bold">$${S.users.reduce((a,u)=>{const d=JSON.parse(localStorage.getItem('nx_'+u.email)||'{}');return a+(d?.demoBalance||0);},0).toFixed(0)}</p></div><div class="glass rounded-xl p-3"><p class="text-[10px] text-mut mb-0.5">Total Trades</p><p class="font-mono text-lg font-bold">${S.users.reduce((a,u)=>{const d=JSON.parse(localStorage.getItem('nx_'+u.email)||'{}');return a+(d?.totalTrades||0);},0)}</p></div></div>
<div class="glass rounded-xl overflow-hidden mb-5"><div class="p-3 border-b border-bd"><h3 class="text-xs font-semibold">Users</h3></div><div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="text-[10px] text-mut bg-cd/50"><th class="p-2.5">Name</th><th class="p-2.5">Email</th><th class="p-2.5">Plan</th><th class="p-2.5">Demo</th><th class="p-2.5">Live</th><th class="p-2.5">Trades</th><th class="p-2.5">Action</th></tr></thead><tbody>${S.users.map(u=>{const d=JSON.parse(localStorage.getItem('nx_'+u.email)||'{}');return'<tr class="trade-row border-b border-bd/30"><td class="p-2.5 font-medium">'+u.name+'</td><td class="p-2.5 font-mono text-[10px] text-mut">'+u.email+'</td><td class="p-2.5"><span class="sb '+(u.plan==='premium'?'bg-acc/15 text-acc':u.plan==='pro'?'bg-inf/15 text-inf':'bg-wrn/15 text-wrn')+'">'+u.plan+'</span></td><td class="p-2.5 font-mono">$'+(d?.demoBalance||0).toFixed(0)+'</td><td class="p-2.5 font-mono">$'+(d?.liveBalance||0).toFixed(0)+'</td><td class="p-2.5 font-mono">'+(d?.totalTrades||0)+'</td><td class="p-2.5"><select onchange="chPlan(\''+u.email+'\',this.value)" class="input-f rounded px-1.5 py-0.5 text-[10px]"><option value="basic" '+(u.plan==='basic'?'selected':'')+'>Basic</option><option value="pro" '+(u.plan==='pro'?'selected':'')+'>Pro</option><option value="premium" '+(u.plan==='premium'?'selected':'')+'>Premium</option></select></td></tr>';}).join('')}</tbody></table></div></div>
<div class="glass rounded-xl overflow-hidden"><div class="p-3 border-b border-bd"><h3 class="text-xs font-semibold">Pending Withdrawals</h3></div><div class="p-3">${pwHTML||'<p class="text-mut text-xs text-center py-3">No pending withdrawals</p>'}</div></div>`;
}
function chPlan(e,p){const u=S.users.find(x=>x.email===e);if(u){u.plan=p;ST.saveUser();toast(e+' → '+p,'success');renderPage();}}
function aprW(e,id){const d=JSON.parse(localStorage.getItem('nx_'+e)||'{}');const t=(d.transactions||[]).find(x=>x.id===id);if(t){t.status='approved';localStorage.setItem('nx_'+e,JSON.stringify(d));toast('Approved','success');renderPage();}}
function rejW(e,id){const d=JSON.parse(localStorage.getItem('nx_'+e)||'{}');const t=(d.transactions||[]).find(x=>x.id===id);if(t){t.status='rejected';d.demoBalance=(d.demoBalance||0)+t.amount;localStorage.setItem('nx_'+e,JSON.stringify(d));toast('Rejected — funds returned','warning');renderPage();}}

/* ===== SETTINGS ===== */
function pgSettings(){
document.getElementById('pc').innerHTML=`<h1 class="text-lg font-bold mb-1">Settings</h1><p class="text-mut text-xs mb-5">Account preferences</p>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3">Account</h3><div class="space-y-3"><div><label class="text-[10px] text-mut mb-1 block">Name</label><input type="text" value="${S.user?.name||''}" class="input-f w-full rounded-xl px-3 py-2.5 text-xs" onchange="S.user.name=this.value;ST.saveUser()"></div><div><label class="text-[10px] text-mut mb-1 block">Gmail</label><input type="email" value="${S.user?.email||''}" class="input-f w-full rounded-xl px-3 py-2.5 text-xs font-mono bg-cd/50" readonly></div><div><label class="text-[10px] text-mut mb-1 block">Plan</label><div class="flex gap-2">${['basic','pro','premium'].map(p=>'<div class="flex-1 p-2.5 rounded-lg text-center text-[10px] '+(S.user?.plan===p?'bg-acc/15 text-acc border border-acc/30':'bg-cd text-mut')+'"><p class="font-bold capitalize">'+p+'</p><p class="text-mut">$'+CFG.PLANS[p].price+'/mo</p></div>').join('')}</div></div></div></div>
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3">Security</h3><div class="space-y-3"><div class="flex items-center justify-between"><div><p class="text-xs">Two-Factor Auth</p><p class="text-[10px] text-mut">Google Authenticator</p></div><button onclick="S.user.twoFA=!S.user.twoFA;ST.saveUser();renderPage()" class="w-10 h-5 rounded-full transition-all ${S.user?.twoFA?'bg-acc':'bg-cd'} relative"><span class="absolute top-0.5 ${S.user?.twoFA?'left-[18px]':'left-0.5'} w-4 h-4 rounded-full bg-white transition-all"></span></button></div><div class="flex items-center justify-between"><div><p class="text-xs">Kill Switch</p><p class="text-[10px] text-mut">Emergency stop all</p></div><button onclick="doKillSwitch()" class="px-3 py-1.5 rounded-lg text-[10px] bg-dng/10 text-dng border border-dng/20 hover:bg-dng/20">Activate</button></div></div></div>
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3">Webhook</h3><div class="space-y-3"><div><label class="text-[10px] text-mut mb-1 block">TradingView URL</label><input type="url" placeholder="https://your-server.com/webhook" class="input-f w-full rounded-xl px-3 py-2.5 text-xs font-mono"></div><button class="btn-out w-full py-2 rounded-lg text-xs">Save Webhook</button></div></div>
<div class="glass rounded-xl p-4"><h3 class="text-xs font-semibold mb-3">Copy Trading</h3><div class="space-y-3"><div class="flex items-center justify-between"><div><p class="text-xs">Copy Master Bot</p></div><button class="w-10 h-5 rounded-full bg-cd relative"><span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white"></span></button></div><div><label class="text-[10px] text-mut mb-1 block">Copy Size (%)</label><input type="number" value="50" min="10" max="100" class="input-f w-full rounded-xl px-3 py-2.5 text-xs font-mono"></div></div></div></div>
<div class="glass rounded-xl p-4 mt-5 border-dng/20"><h3 class="text-xs font-semibold text-dng mb-3">Danger Zone</h3><div class="flex gap-3"><button onclick="if(confirm('Reset all data?')){S.trades=[];S.openTrades=[];S.signals=[];S.totalTrades=0;S.wins=0;S.dailyPnL=0;S.demoBalance=10000;S.liveBalance=0;S.demoEquity=10000;S.liveEquity=0;ST.saveData();toast('Reset done','warning');renderPage();}" class="px-3 py-2 rounded-lg text-xs bg-dng/10 text-dng border border-dng/20 hover:bg-dng/20">Reset Data</button><button onclick="logout()" class="px-3 py-2 rounded-lg text-xs btn-out">Sign Out</button></div></div>`;
}

/* ===== INIT ===== */
ST.loadUsers();
if(checkSession()){renderApp();}else{renderAuth();}
</script>
